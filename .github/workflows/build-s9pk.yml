name: Build s9pk

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: namecoin-core-startos

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: matrix.platform == 'aarch64'

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Extract start-sdk from StartOS ISO
        run: |
          # Download the x86_64 ISO and extract startbox/start-sdk
          curl -fsSL -o /tmp/startos.iso "https://github.com/Start9Labs/start-os/releases/download/v0.3.5.1/startos-0.3.5.1-39de098_x86_64.iso"
          mkdir -p /tmp/iso
          sudo mount -o loop /tmp/startos.iso /tmp/iso || sudo mount -o loop,ro /tmp/startos.iso /tmp/iso
          # startbox is typically in /usr/bin or /usr/local/bin on the ISO's squashfs
          SQFS=$(find /tmp/iso -name '*.squashfs' -o -name 'filesystem.squashfs' 2>/dev/null | head -1)
          if [ -n "$SQFS" ]; then
            sudo apt-get install -y squashfs-tools
            mkdir -p /tmp/sqfs
            sudo unsquashfs -d /tmp/sqfs "$SQFS"
            find /tmp/sqfs -name 'startbox' -o -name 'start-sdk' 2>/dev/null | head -5
            STARTBOX=$(find /tmp/sqfs -name 'startbox' -type f | head -1)
            if [ -n "$STARTBOX" ]; then
              sudo cp "$STARTBOX" /usr/local/bin/start-sdk
              sudo chmod +x /usr/local/bin/start-sdk
            fi
          fi
          # Alternative: check live filesystem directly
          find /tmp/iso -name 'startbox' -o -name 'start-sdk' 2>/dev/null | head -5
          which start-sdk && echo "start-sdk ready" || echo "start-sdk not found"
          sudo umount /tmp/iso 2>/dev/null || true

      - name: Extract version
        id: version
        run: echo "version=$(yq e '.version' manifest.yaml)" >> $GITHUB_OUTPUT

      - name: Build x86_64 Docker image
        if: matrix.platform == 'x86_64'
        run: |
          mkdir -p docker-images
          DOCKER_CLI_EXPERIMENTAL=enabled docker buildx build \
            --tag start9/namecoind/main:${{ steps.version.outputs.version }} \
            --platform=linux/amd64 \
            --load .
          docker save start9/namecoind/main:${{ steps.version.outputs.version }} > docker-images/x86_64.tar

      - name: Build aarch64 Docker image
        if: matrix.platform == 'aarch64'
        run: |
          mkdir -p docker-images
          DOCKER_CLI_EXPERIMENTAL=enabled docker buildx build \
            --tag start9/namecoind/main:${{ steps.version.outputs.version }} \
            --platform=linux/arm64 \
            -o type=docker,dest=docker-images/aarch64.tar .

      - name: Pack s9pk
        run: |
          if command -v start-sdk &>/dev/null; then
            start-sdk init 2>/dev/null || true
            start-sdk pack
          else
            echo "start-sdk not available, skipping pack step"
            echo "Docker image built successfully — manual pack needed"
          fi

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.platform }}
          path: namecoin-core-startos/docker-images/${{ matrix.platform }}.tar
          retention-days: 7

      - name: Upload s9pk artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('namecoin-core-startos/*.s9pk') != ''
        with:
          name: namecoind-s9pk
          path: "namecoin-core-startos/*.s9pk"
          retention-days: 30

      - name: Smoke test - verify binary works
        run: |
          docker run --rm start9/namecoind/main:${{ steps.version.outputs.version }} namecoind --version
          docker run --rm start9/namecoind/main:${{ steps.version.outputs.version }} namecoin-cli --version
