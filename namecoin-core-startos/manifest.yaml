# Namecoin Core service wrapper for StartOS
id: namecoind
title: "Namecoin Core"
version: 30.2.0.1
release-notes: |
  * Initial release of Namecoin Core for StartOS
  * Based on upstream Namecoin Core nc30.2 (Bitcoin Core 30.2 fork)
  * Full node with name registration, lookup, and wallet functionality
  * Merged mining support
license: MIT
wrapper-repo: "https://github.com/mstrofnone/namecoin-core-startos"
upstream-repo: "https://github.com/namecoin/namecoin-core"
support-site: "https://github.com/namecoin/namecoin-core/issues"
marketing-site: "https://www.namecoin.org/"
donation-url: "https://www.namecoin.org/donate/"
build: ["make"]
min-os-version: 0.3.5.1
description:
  short: Namecoin full node and wallet — the first Bitcoin fork, enabling decentralized DNS and identity
  long: |
    Namecoin is a decentralized, open source information registration and transfer system based on
    the Bitcoin cryptocurrency. It was the first fork of Bitcoin and the first to implement merged
    mining and a decentralized DNS.

    Namecoin can be used to:
    - Register and manage .bit domain names resistant to censorship
    - Store identity information (email, GPG key, BTC address, TLS fingerprints, etc.)
    - Create human-readable Tor .onion names
    - Securely record and transfer arbitrary name/value pairs

    Namecoin Core is the reference full node implementation, based on the Bitcoin Core codebase.
    Running your own Namecoin node allows you to independently verify the Namecoin blockchain,
    register and manage names, and transact NMC without trusting any third party.
assets:
  license: LICENSE
  icon: icon.png
  instructions: instructions.md
main:
  type: docker
  image: main
  entrypoint: docker_entrypoint.sh
  args: []
  mounts:
    main: /root/.namecoin
    compat: /mnt/assets
  io-format: yaml
health-checks:
  rpc:
    name: Namecoin RPC
    success-message: Namecoin Core is ready
    type: docker
    image: main
    entrypoint: check-rpc.sh
    args: []
    inject: true
    system: false
    io-format: yaml
config:
  get:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - config
      - get
      - /root
      - "/mnt/assets/config_spec.yaml"
    mounts:
      compat: /mnt/assets
      main: /root
    io-format: yaml
  set:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - config
      - set
      - namecoind
      - /root
      - "/mnt/assets/config_rules.yaml"
    mounts:
      compat: /mnt/assets
      main: /root
    io-format: yaml
properties:
  type: docker
  image: main
  entrypoint: properties.sh
  args: []
  mounts:
    main: /root/.namecoin
  io-format: yaml
volumes:
  main:
    type: data
  compat:
    type: assets
interfaces:
  main:
    name: Namecoin RPC Interface
    description: The RPC interface for Namecoin Core
    tor-config:
      port-mapping:
        8336: "8336"
    lan-config:
      443:
        ssl: true
        internal: 8336
    ui: false
    protocols:
      - tcp
      - http
      - json-rpc
  peer:
    name: Namecoin P2P Interface
    description: The peer-to-peer interface for Namecoin Core
    tor-config:
      port-mapping:
        8334: "8334"
    lan-config: null
    ui: false
    protocols:
      - tcp
      - bitcoin
backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - namecoind
      - /mnt/backup
      - /root/.namecoin/wallet.dat
    mounts:
      BACKUP: /mnt/backup
      main: /root/.namecoin
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - namecoind
      - /root/.namecoin/wallet.dat
      - /mnt/backup
    mounts:
      BACKUP: /mnt/backup
      main: /root/.namecoin
migrations:
  from:
    "*":
      type: docker
      image: main
      entrypoint: migrations.sh
      args: ["from"]
      mounts:
        main: /root/.namecoin
      io-format: yaml
  to:
    "*":
      type: docker
      image: main
      entrypoint: migrations.sh
      args: ["to"]
      mounts:
        main: /root/.namecoin
      io-format: yaml
actions:
  reindex:
    name: Reindex Blockchain
    description: Rebuilds the blockchain index from scratch. This can take several hours.
    warning: This will cause Namecoin Core to stop and restart. The reindex process may take a very long time depending on your hardware.
    allowed-statuses:
      - running
      - stopped
    implementation:
      type: docker
      image: main
      entrypoint: reindex.sh
      args: []
      inject: true
      io-format: yaml
      mounts:
        main: /root/.namecoin
alerts:
  install: |
    Namecoin Core requires a full blockchain sync on first install. This process can take
    several hours to days depending on your hardware and internet connection. The Namecoin
    blockchain is significantly smaller than the Bitcoin blockchain.
  uninstall: |
    Uninstalling Namecoin Core will result in permanent loss of data. Without a backup,
    any NMC funds stored in the node's wallet and any registered names will be lost forever.
    We strongly recommend making a backup before uninstalling.
  restore: |
    Restoring Namecoin Core will overwrite its current data, including the wallet. Any
    changes made since the last backup will be lost.
  start: |
    Namecoin Core will begin syncing the blockchain. On first run, this may take a long time.
