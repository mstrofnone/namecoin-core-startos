# Configuration specification for Namecoin Core on StartOS
rpc:
  type: object
  name: "RPC Settings"
  description: "Settings for the JSON-RPC interface"
  spec:
    username:
      type: string
      name: "RPC Username"
      description: "The username for connecting to the RPC interface"
      nullable: false
      default: "namecoin"
      pattern: "^[a-zA-Z0-9_]+$"
      pattern-description: "Must be alphanumeric (underscores allowed)"
    password:
      type: string
      name: "RPC Password"
      description: "The password for connecting to the RPC interface. If left empty, one will be generated automatically."
      nullable: true
      default: ~
      masked: true
pruning:
  type: object
  name: "Pruning"
  description: "Blockchain pruning settings. Pruning reduces disk usage but removes old block data."
  spec:
    mode:
      type: enum
      name: "Pruning Mode"
      description: "Whether to prune the blockchain data"
      values:
        - disabled
        - automatic
      default: "disabled"
      value-names:
        disabled: "Disabled (Full Node)"
        automatic: "Automatic Pruning"
    size:
      type: number
      name: "Prune Target (MiB)"
      description: "Target size of blockchain data in MiB when pruning is enabled (minimum 550)"
      nullable: false
      default: 550
      range: "[550,*)"
      integral: true
      units: "MiB"
txindex:
  type: boolean
  name: "Transaction Index"
  description: "Maintain a full transaction index. Required by some services. Cannot be used with pruning."
  default: true
advanced:
  type: object
  name: "Advanced"
  description: "Advanced configuration options"
  spec:
    dbcache:
      type: number
      name: "Database Cache Size (MiB)"
      description: "Size of the UTXO database cache in MiB. Larger values improve sync speed but use more RAM."
      nullable: false
      default: 450
      range: "[4,16384]"
      integral: true
      units: "MiB"
    maxconnections:
      type: number
      name: "Max Connections"
      description: "Maximum number of peer connections"
      nullable: false
      default: 125
      range: "[0,1000]"
      integral: true
    maxuploadtarget:
      type: number
      name: "Max Upload Target (MiB/day)"
      description: "Maximum upload bandwidth target in MiB per day. 0 means unlimited."
      nullable: false
      default: 0
      range: "[0,*)"
      integral: true
      units: "MiB/day"
