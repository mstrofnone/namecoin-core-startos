# Configuration rules for Namecoin Core
# Rule syntax: StartOS compat bool_expr DSL

# If pruning is enabled, txindex must be disabled
- rule: "!( 'pruning.mode = \"automatic\" AND txindex? )"
  description: "Transaction index cannot be used with pruning enabled. Disable txindex or disable pruning."
  suggestions:
    - SET:
        var: "txindex"
        to-value: false
